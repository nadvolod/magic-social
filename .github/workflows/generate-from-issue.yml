name: Generate LinkedIn Drafts from Issue

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number"
        required: true
      variants:
        description: "Number of variants"
        default: "5"
        required: false

concurrency:
  group: generate-from-issue-${{ github.event.issue.number || github.event.inputs.issue }}
  cancel-in-progress: false

jobs:
  generate:
    # Auto-trigger: any Issue opened with `needs_generation` (the content_idea
    # template applies it automatically), OR any time the `needs_generation`
    # label is added later. To regenerate, remove and re-add the label.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'needs_generation')) ||
          (github.event.action == 'labeled' && github.event.label.name == 'needs_generation')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WRITING_MODEL: ${{ vars.WRITING_MODEL || 'gpt-5.4' }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue }}"
          VARIANTS="${{ github.event.inputs.variants || '5' }}"
          python -m src.agent generate-from-issue \
            --repo "${{ github.repository }}" \
            --issue "$ISSUE_NUMBER" \
            --variants "$VARIANTS"

      - name: Commit generated drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "magic-social-bot"
          git config user.email "magic-social-bot@users.noreply.github.com"
          git add drafts/ playbook/ || true
          if git diff --staged --quiet; then
            echo "No draft changes to commit"
          else
            ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue }}"
            git commit -m "chore: drafts for issue #${ISSUE_NUMBER} [skip ci]"
            git push
          fi
