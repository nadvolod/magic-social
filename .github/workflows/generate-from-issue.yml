name: Generate LinkedIn Drafts from Issue

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number"
        required: true
      variants:
        description: "Number of variants"
        default: "5"
        required: false

concurrency:
  group: generate-from-issue-${{ github.event.issue.number || github.event.inputs.issue }}
  cancel-in-progress: false

jobs:
  generate:
    # Only run on /generate comments authored by repo owner/members; ignore comments on PRs.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '/generate') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: React to triggering comment
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -d '{"content":"eyes"}' || true

      - name: Generate drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WRITING_MODEL: ${{ vars.WRITING_MODEL || 'gpt-5.4' }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue }}"
          VARIANTS="${{ github.event.inputs.variants || '5' }}"
          python -m src.agent generate-from-issue \
            --repo "${{ github.repository }}" \
            --issue "$ISSUE_NUMBER" \
            --variants "$VARIANTS"

      - name: Commit generated drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "magic-social-bot"
          git config user.email "magic-social-bot@users.noreply.github.com"
          git add drafts/ playbook/ || true
          if git diff --staged --quiet; then
            echo "No draft changes to commit"
          else
            ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue }}"
            git commit -m "chore: drafts for issue #${ISSUE_NUMBER} [skip ci]"
            git push
          fi
