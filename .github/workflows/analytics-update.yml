name: Collect Analytics & Update Learning
# ⚠️ ARCHIVED — v1 operations shut down. This workflow is kept for reference only.
# Automatic triggers have been removed. See v1/ directory for the full v1 source.

on:
  workflow_dispatch:

jobs:
  collect-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write posts JSON if provided
        if: inputs.posts_json != ''
        run: echo '${{ inputs.posts_json }}' > /tmp/posts.json

      - name: Collect analytics and update learning state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--repo ${{ github.repository }}"

          if [ -f /tmp/posts.json ]; then
            ARGS="$ARGS --posts /tmp/posts.json"
          fi

          python -m src.agent analytics $ARGS

      - name: Regenerate METRICS.md
        run: python -m src.agent metrics

      - name: Show experiment summary
        run: python -m src.agent experiments

      - name: Commit updated learning state + metrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for f in learning_state.json experiments.json METRICS.md README.md; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update learning state and dashboard [skip ci]"
            git push
          fi
