name: Collect Analytics & Update Learning

on:
  workflow_dispatch:
    inputs:
      posts_json:
        description: "JSON array of Post objects (paste inline or leave empty)"
        required: false
  schedule:
    # Run every Wednesday and Friday at 09:00 UTC to collect 48h+ post analytics
    - cron: "0 9 * * 3,5"

jobs:
  collect-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write posts JSON if provided
        if: inputs.posts_json != ''
        run: echo '${{ inputs.posts_json }}' > /tmp/posts.json

      - name: Collect analytics and update learning state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--repo ${{ github.repository }}"

          if [ -f /tmp/posts.json ]; then
            ARGS="$ARGS --posts /tmp/posts.json"
          fi

          python -m src.agent analytics $ARGS

      - name: Regenerate METRICS.md
        run: python -m src.agent metrics

      - name: Show experiment summary
        run: python -m src.agent experiments

      - name: Refresh data-driven retrospective
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WRITING_MODEL: ${{ vars.WRITING_MODEL || 'gpt-5.4' }}
        run: python -m src.agent retrospective --lookback-days 60

      - name: Refresh voice playbook
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WRITING_MODEL: ${{ vars.WRITING_MODEL || 'gpt-5.4' }}
        run: python -m src.agent derive-voice

      - name: Commit updated learning state + metrics + retrospective + voice
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for f in learning_state.json experiments.json METRICS.md README.md playbook/retrospective.md playbook/voice.md; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update learning state, dashboard, retrospective [skip ci]"
            git push
          fi
