name: Scan Commits & Generate Posts

on:
  push:
    branches: [main]
  schedule:
    # Run every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "Scan commits since (ISO 8601, e.g. 2024-01-01T00:00:00Z)"
        required: false
      max_posts:
        description: "Maximum posts to generate"
        default: "10"
        required: false
      dry_run:
        description: "Dry run (print posts, don't create issues)"
        type: boolean
        default: false

concurrency:
  group: scan-commits
  cancel-in-progress: false

jobs:
  scan-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate OpenAI key
        if: ${{ !inputs.dry_run }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required to generate production-quality posts."
            exit 1
          fi

      - name: Health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.agent health-check --repo nadvolod/magic-social 2>&1 | tee /tmp/health.txt || true
          if grep -q "problem(s) found" /tmp/health.txt; then
            echo "::warning::Health check found problems — see details above"
            cat /tmp/health.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Scan commits and generate posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOCIAL_LESSONS_DOC_URL: ${{ vars.SOCIAL_LESSONS_DOC_URL }}
        run: |
          ARGS="--repos nadvolod/LifeNotes nadvolod/temporal-learning nadvolod/ultimate-code-metrics nadvolod/ceo-mission-control nadvolod/magic-social --branch main --issue-repo nadvolod/magic-social --variations 1"

          if [ -n "${{ inputs.since }}" ]; then
            ARGS="$ARGS --since ${{ inputs.since }}"
          fi

          if [ -n "${{ inputs.max_posts }}" ]; then
            ARGS="$ARGS --max-posts ${{ inputs.max_posts }}"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python -m src.agent scan $ARGS

      - name: Persist state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for f in experiments.json bar_raiser_state.json predictions_log.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: persist agent state [skip ci]"
            git push
          fi
