name: Scan Commits & Generate Posts

on:
  push:
    branches: [main]
  schedule:
    # Run every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "Scan commits since (ISO 8601, e.g. 2024-01-01T00:00:00Z)"
        required: false
      max_posts:
        description: "Maximum posts to generate"
        default: "10"
        required: false
      dry_run:
        description: "Dry run (print posts, don't create issues)"
        type: boolean
        default: false

jobs:
  scan-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate OpenAI key
        if: ${{ inputs.dry_run != 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required to generate production-quality posts."
            exit 1
          fi

      - name: Scan commits and generate posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOCIAL_LESSONS_DOC_URL: ${{ vars.SOCIAL_LESSONS_DOC_URL }}
        run: |
          ARGS="--repo ${{ github.repository }} --branch main"

          if [ -n "${{ inputs.since }}" ]; then
            ARGS="$ARGS --since ${{ inputs.since }}"
          fi

          if [ -n "${{ inputs.max_posts }}" ]; then
            ARGS="$ARGS --max-posts ${{ inputs.max_posts }}"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python -m src.agent scan $ARGS
