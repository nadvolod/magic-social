# GitHub Commit → Social Post Agent Configuration

agent:
  # Repos to scan for lesson-worthy commits.
  # Edit this list to add or remove monitored repos.
  source_repos:
    - nadvolod/LifeNotes
    - nadvolod/temporal-learning
    - nadvolod/ultimate-code-metrics
    - nadvolod/ceo-mission-control
    - nadvolod/magic-social

  # Repo where social-post Issues are created (separate from scan sources)
  issue_repo: nadvolod/magic-social

  # Default branch to scan for commits
  default_branch: main

  # How many days back to scan when no 'since' date is provided
  scan_days: 7

  # Maximum posts to generate per scan run
  max_posts_per_run: 10

  # Number of post variations to generate per commit (different hook patterns)
  # More variations = better chance of finding a publishable post
  variations_per_commit: 3

  # Minimum commit score to qualify for post generation (0-100)
  score_threshold: 30.0

  # OpenAI model to use for post generation
  openai_model: gpt-5.4-mini

scoring:
  # Weight multipliers for each scoring dimension
  # These are updated automatically by the learning loop
  weights:
    novelty: 1.0
    impact: 1.0
    teachability: 1.0
    relevance: 1.0
    proof: 1.0

post_generation:
  # Default hook pattern to use (overridden by learning loop)
  default_hook_pattern: result

  # LinkedIn post target length range (characters)
  linkedin_min_chars: 800
  linkedin_max_chars: 1500

topics:
  # Topics to prioritize for post generation (must match scoring.py RELEVANT_TOPICS)
  priority:
    - ai
    - distributed-systems
    - testing
    - performance
    - reliability

content:
  # Your niche — all posts should relate to these topics
  niche_keywords:
    - ai agents
    - temporal
    - distributed systems
    - claude
    - openai
    - gemini
    - workflow orchestration
    - durable execution
    - llm
    - agentic
  niche_description: "AI agentic systems, Temporal.io, distributed systems, LLMs (Claude, GPT, Gemini)"

  # Idea bank — topics the system can generate from even without commits
  idea_bank:
    - topic: "Building AI agents with Temporal.io"
      context: "Deep research agent, durable workflows, crash recovery for agents"
    - topic: "Why most AI agent frameworks fail at production"
      context: "Temporal solves retry, state persistence, crash recovery — frameworks don't"
    - topic: "The hidden cost of AI agent hallucinations in production"
      context: "Guardrails, human-in-the-loop, idempotent activities"

storage:
  # Path to learning state JSON file
  learning_state_path: learning_state.json

  # Path to experiments state JSON file
  experiments_path: experiments.json

regeneration:
  # Auto-regenerate rejected posts with better source material
  enabled: true
  max_attempts: 3          # Max regeneration attempts per chain
  scan_days: 14            # Wider scan window for finding alternatives
  score_threshold: 20.0    # Lower threshold to cast wider net

privacy:
  # Always enforce — no config override available
  # Commits containing these patterns are never processed
  # See scoring.py SENSITIVE_PATTERNS for the full list
  enforce_sensitive_filter: true

experiments:
  # Minimum posts per variant before declaring a winner
  min_samples_per_variant: 3
