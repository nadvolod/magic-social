<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="magic-social — turn ideas into LinkedIn posts that win">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#EC4899;#3B82F6;#7C3AED" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#3B82F6;#7C3AED;#EC4899" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3B82F6">
        <animate attributeName="stop-color" values="#3B82F6;#7C3AED;#EC4899;#3B82F6" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="bubble" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="sparkle" viewBox="-10 -10 20 20">
      <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#FDE68A"/>
    </symbol>

    <symbol id="star" viewBox="-6 -6 12 12">
      <circle r="1.5" fill="#FFFFFF"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#sky)"/>

  <!-- soft floating orbs -->
  <circle cx="180" cy="80"  r="60" fill="#FFFFFF" opacity="0.08">
    <animate attributeName="cy" values="80;110;80" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="240" r="90" fill="#FFFFFF" opacity="0.07">
    <animate attributeName="cy" values="240;210;240" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="60" r="40" fill="#FFFFFF" opacity="0.10">
    <animate attributeName="cx" values="960;990;960" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- twinkling stars -->
  <g>
    <use href="#star" x="120"  y="200"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></use>
    <use href="#star" x="260"  y="60" ><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></use>
    <use href="#star" x="430"  y="250"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></use>
    <use href="#star" x="780"  y="40" ><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></use>
    <use href="#star" x="1020" y="160"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/></use>
    <use href="#star" x="1180" y="80" ><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></use>
    <use href="#star" x="640"  y="280"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/></use>
  </g>

  <!-- floating chat bubble (the "social" character) -->
  <g transform="translate(170 160)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="3.5s" repeatCount="indefinite"/>
      <!-- bubble -->
      <path d="M-90,-60 q0,-30 30,-30 h120 q30,0 30,30 v60 q0,30 -30,30 h-40 l-30,30 v-30 h-50 q-30,0 -30,-30 z"
            fill="url(#bubble)" stroke="#FFFFFF" stroke-width="2" filter="url(#glow)"/>
      <!-- eyes -->
      <circle cx="-22" cy="-22" r="6" fill="#312E81"/>
      <circle cx="22"  cy="-22" r="6" fill="#312E81"/>
      <circle cx="-20" cy="-24" r="2" fill="#FFFFFF"/>
      <circle cx="24"  cy="-24" r="2" fill="#FFFFFF"/>
      <!-- smile -->
      <path d="M-18,0 q18,18 36,0" stroke="#312E81" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <circle cx="-34" cy="-6" r="6" fill="#F472B6" opacity="0.6"/>
      <circle cx="34"  cy="-6" r="6" fill="#F472B6" opacity="0.6"/>
      <!-- tiny heart antenna -->
      <path d="M0,-90 c-4,-6 -14,-2 -10,6 c2,6 10,10 10,10 c0,0 8,-4 10,-10 c4,-8 -6,-12 -10,-6 z" fill="#F472B6">
        <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="1.4s" repeatCount="indefinite" additive="sum"/>
      </path>
    </g>
  </g>

  <!-- magic wand sparkles around title -->
  <g>
    <use href="#sparkle" x="430" y="80" width="22" height="22">
      <animateTransform attributeName="transform" type="rotate" from="0 430 80" to="360 430 80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" x="1180" y="180" width="28" height="28">
      <animateTransform attributeName="transform" type="rotate" from="0 1180 180" to="-360 1180 180" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" x="540" y="260" width="16" height="16">
      <animateTransform attributeName="transform" type="rotate" from="0 540 260" to="360 540 260" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" x="1100" y="60" width="18" height="18">
      <animateTransform attributeName="transform" type="rotate" from="0 1100 60" to="360 1100 60" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- title -->
  <g transform="translate(360 130)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="92" font-weight="900" fill="url(#title)" letter-spacing="-2">
      magic-social
      <animate attributeName="opacity" values="0.92;1;0.92" dur="3s" repeatCount="indefinite"/>
    </text>

    <text x="4" y="48" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="26" font-weight="500" fill="#FFFFFF" opacity="0.95">
      ideas → drafts → posts that win ✨
    </text>

    <!-- pill badges -->
    <g transform="translate(2 78)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600">
      <g>
        <rect x="0" y="0" width="124" height="28" rx="14" fill="#FFFFFF" opacity="0.18"/>
        <text x="62" y="19" text-anchor="middle" fill="#FFFFFF">🧠 learning loop</text>
      </g>
      <g transform="translate(136 0)">
        <rect x="0" y="0" width="116" height="28" rx="14" fill="#FFFFFF" opacity="0.18"/>
        <text x="58" y="19" text-anchor="middle" fill="#FFFFFF">🧪 A/B testing</text>
      </g>
      <g transform="translate(264 0)">
        <rect x="0" y="0" width="132" height="28" rx="14" fill="#FFFFFF" opacity="0.18"/>
        <text x="66" y="19" text-anchor="middle" fill="#FFFFFF">📸 peer signals</text>
      </g>
    </g>
  </g>

  <!-- a couple of trailing sparkles that drift across -->
  <g opacity="0.9">
    <use href="#sparkle" x="0" y="40" width="14" height="14">
      <animateMotion path="M 0,0 C 200,40 400,-40 1280,20" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </use>
    <use href="#sparkle" x="0" y="240" width="12" height="12">
      <animateMotion path="M 0,0 C 300,-30 700,30 1280,-20" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="14s" repeatCount="indefinite"/>
    </use>
  </g>
</svg>
